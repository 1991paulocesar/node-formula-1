info:
  name: post-drivers
  type: http

http:
  method: POST
  url: "{{base_url}}/drivers"
  body:
    type: json
    data: |-
      {
        "name": "Charles Leclerc",
        "team": "Ferrari"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
